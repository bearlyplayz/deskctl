name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # release notes are generated from history since the previous tag
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # The tag is the version. v1.2.3 -> 1.2.3, which stamps the assembly and so `windeskctl --version`.
      - id: version
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}' -replace '^v', ''
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Tag '${{ github.ref_name }}' is not vMAJOR.MINOR.PATCH" }
          "value=$v" >> $env:GITHUB_OUTPUT

      - run: dotnet test -c Release

      - run: dotnet publish src/WinDeskCtl/WinDeskCtl.csproj -c Release -p:Version=${{ steps.version.outputs.value }} -o publish

      # A release created with GITHUB_TOKEN raises no events, so an `on: release` workflow will
      # not fire from this step — creating one requires switching this to a PAT.
      - shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ github.ref_name }}' publish/windeskctl.exe --generate-notes
