name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # release notes are generated from history since the previous tag
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # The tag is the version. v1.2.3 -> 1.2.3, which stamps the assembly and so `deskctl --version`.
      - id: version
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}' -replace '^v', ''
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Tag '${{ github.ref_name }}' is not vMAJOR.MINOR.PATCH" }
          "value=$v" >> $env:GITHUB_OUTPUT

      - run: dotnet test -c Release

      - run: dotnet publish src/Deskctl/Deskctl.csproj -c Release -p:Version=${{ steps.version.outputs.value }} -o publish

      - shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ github.ref_name }}' publish/deskctl.exe --generate-notes

  # Submits an update PR to microsoft/winget-pkgs, forking it on first use. WINGET_TOKEN must be a
  # classic PAT with `public_repo` scope; fine-grained tokens and GITHUB_TOKEN are both rejected.
  # `update` only edits a package that already exists — the first version is submitted by hand.
  # A release created with GITHUB_TOKEN raises no events, so `on: release` never fires here.
  winget:
    needs: release
    if: vars.PUBLISH_WINGET == 'true'
    runs-on: windows-latest
    steps:
      - shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update Deskctl.Deskctl `
            --version '${{ needs.release.outputs.version }}' `
            --urls 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deskctl.exe' `
            --submit --no-open --token $env:WINGET_TOKEN
