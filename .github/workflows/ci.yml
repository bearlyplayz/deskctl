name: ci

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    paths-ignore: ['**.md', 'LICENSE']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet build -c Release
      - run: dotnet test -c Release
      # AOT link and trim failures only surface at publish, never at build or test.
      - run: dotnet publish src/Deskctl/Deskctl.csproj -c Release
